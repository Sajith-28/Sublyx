version: '3.8'

services:
  backend:
    build: 
      context: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/data:/app/data
      - ./backend/uploads:/app/uploads
      - ./backend/audio:/app/audio
    environment:
      - DATABASE_URL=sqlite:///./data/captionai.db
    restart: unless-stopped

  frontend:
    build: 
      context: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped
