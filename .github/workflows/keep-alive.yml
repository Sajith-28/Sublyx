name: Keep Alive Render API

on:
  schedule:
    - cron: '*/10 * * * *' # Every 10 minutes
  workflow_dispatch: # Allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping API Endpoint
        run: |
          curl -sI https://sublyx-backend.onrender.com/
          echo "Render API pinged successfully."
